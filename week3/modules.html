<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="JavaScript modules activity for managing BYU-Idaho course section enrollment."
  >
  <meta name="author" content="Mezger Abrão">

  <title>Modules Example: Course and Sections</title>

  <link rel="stylesheet" href="styles/modules.css">

  <script type="module" src="scripts/modules.mjs"></script>
</head>

<body>
  <main>
    <h1 id="courseName"></h1>
    <h2 id="courseCode"></h2>

    <div id="enrollment">
      <label for="sectionNumber">Choose a section:</label>

      <select id="sectionNumber">
        <option value="0" disabled selected>--</option>
      </select>

      <button id="enrollStudent" type="button">
        Enroll a Student
      </button>

      <button id="dropStudent" type="button">
        Drop a Student
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Section</th>
          <th>Enrolled</th>
          <th>Instructor</th>
        </tr>
      </thead>

      <tbody id="sections"></tbody>
    </table>
  </main>
</body>
</html>
